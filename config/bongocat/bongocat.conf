# ═══════════════════════════════════════════════════════════════════════════
# BONGO CAT CONFIG - Minimal defaults, uncomment to customize
# ═══════════════════════════════════════════════════════════════════════════

# Position & Size
cat_height=34
cat_align=center
cat_x_offset=300

# Appearance
enable_antialiasing=1
overlay_height=38
overlay_opacity=0
overlay_position=top
layer=top
# mirror_x=0
# mirror_y=0

# Input device (run bongocat-find-devices to find yours)
keyboard_device=/dev/input/event2  # AT Translated Set 2 keyboard
keyboard_device=/dev/input/event3  # SONIX M87 keyboard
keyboard_device=/dev/input/event6  # SONIX M87 keyboard Keyboard
keyboard_device=/dev/input/event12  # ITE Tech. Inc. ITE Device(8910) Keyboard

# Multi-monitor (optional - auto-detects by default)
monitor=eDP-1

# Sleep mode (optional)
# idle_sleep_timeout=300
# enable_scheduled_sleep=0
# sleep_begin=22:00
# sleep_end=06:00